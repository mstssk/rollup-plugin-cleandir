name: Test
on:
  - push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"
      - uses: wearerequired/lint-action@v2
        with:
          prettier: true
          prettier_command_prefix: npx
      - run: npm cit
      - uses: actions/upload-artifact@v3
        if: ${{ always() }}
        with:
          name: coverage
          path: coverage
      - run: npm it
        if: ${{ always() }}
        working-directory: ./example
